name: update-cask

# Pull model: this tap watches the source repo's releases and updates its own
# cask. Everything runs with the built-in, ephemeral GITHUB_TOKEN scoped to this
# repo, so no long-term or cross-repo credential is stored anywhere. The bump
# commit is created via the GitHub API so it is signed/verified (main requires
# signed commits).

on:
  schedule:
    - cron: '23 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SOURCE_REPO: quizhats/font-dm-mono-nerd-font
  CASK: Casks/font-dm-mono-nerd-font.rb

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bump cask to latest verified release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="$(gh release view --repo "$SOURCE_REPO" --json tagName --jq .tagName)"
          version="${tag#v}"

          current="$(sed -n -E 's/^  version "(.*)"/\1/p' "$CASK")"
          if [ "$version" = "$current" ]; then
            echo "Cask already at $version; nothing to do."
            exit 0
          fi

          zip="DMMonoNerdFont-v${version}.zip"
          gh release download "$tag" --repo "$SOURCE_REPO" --pattern "$zip" --output "$zip" --clobber

          # Trust the artifact only if its build provenance verifies against the
          # source repo's release workflow. Fails closed if the attestation is
          # missing or does not match.
          gh attestation verify "$zip" --repo "$SOURCE_REPO"

          sha="$(shasum -a 256 "$zip" | cut -d' ' -f1)"
          rm -f "$zip"

          sed -i -E "s/^(  version )\".*\"/\1\"${version}\"/" "$CASK"
          sed -i -E "s/^(  sha256 )\".*\"/\1\"${sha}\"/" "$CASK"

          branch="bump-dm-mono-${version}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}" >/dev/null 2>&1; then
            echo "Branch ${branch} already exists; a bump PR is likely open. Skipping."
            exit 0
          fi

          base_oid="$(git rev-parse HEAD)"

          # Create the branch at HEAD, then add the commit through the GitHub API.
          # API commits authored by GITHUB_TOKEN are signed by GitHub (verified),
          # satisfying the "require signed commits" rule on main.
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/heads/${branch}" -f "sha=${base_oid}" >/dev/null

          gh api graphql \
            -f query='mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$path:String!,$contents:Base64String!,$msg:String!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch},expectedHeadOid:$oid,message:{headline:$msg},fileChanges:{additions:[{path:$path,contents:$contents}]}}){commit{oid}}}' \
            -f repo="${GITHUB_REPOSITORY}" \
            -f branch="${branch}" \
            -f oid="${base_oid}" \
            -f path="${CASK}" \
            -f contents="$(base64 -w0 "$CASK")" \
            -f msg="feat: update font-dm-mono-nerd-font to ${version}" >/dev/null

          gh pr create --repo "${GITHUB_REPOSITORY}" --base main --head "${branch}" \
            --title "feat: update font-dm-mono-nerd-font to ${version}" \
            --body "Automated cask bump to ${version}. Release build-provenance attestation verified."
